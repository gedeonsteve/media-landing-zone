name: Terraform Apply

# Runs after merge to main, or via manual trigger.
# Requires manual approval through the `production` GitHub Environment.

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      module:
        description: 'Terraform module to apply (e.g., terraform/00-bootstrap)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.15.2"
  AWS_REGION: "eu-west-3"
  AWS_ROLE_ARN: ${{ vars.AWS_APPLY_ROLE_ARN }}

jobs:
  detect-changes:
    name: Detect changed Terraform modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine which modules changed
        id: set-matrix
        run: |
          # On manual trigger, use the specified module
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODULE="${{ inputs.module }}"
            MATRIX="[\"$MODULE\"]"
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # On push, detect modules changed in the merged commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^terraform/' \
            | awk -F'/' '{print $1"/"$2}' \
            | sort -u \
            | jq -R . | jq -s -c .)

          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            echo "No Terraform changes detected."
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed modules: $CHANGED"
            echo "matrix=$CHANGED" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  apply:
    name: Apply ${{ matrix.module }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    # CRITICAL: this environment requires manual approval before the job runs.
    # Configure required reviewers in: Settings → Environments → production
    environment: production

    strategy:
      fail-fast: false
      max-parallel: 1   # Never apply multiple modules simultaneously
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Capture outputs
        run: terraform output -json > terraform-outputs.json
        continue-on-error: true

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}/terraform-outputs.json
          retention-days: 30